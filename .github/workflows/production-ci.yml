name: Production Multi-Language Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-verify-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  build-and-verify-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go build -ldflags="-s -w" -o target-binary main.go
